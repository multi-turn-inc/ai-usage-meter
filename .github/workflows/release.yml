name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID Certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE_P12_BASE64" || -z "$APPLE_CERTIFICATE_PASSWORD" ]]; then
            echo "Missing signing secrets. Set APPLE_CERTIFICATE_P12_BASE64 and APPLE_CERTIFICATE_PASSWORD."
            exit 1
          fi

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12

          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain

          # Needed for codesign to access the private key in CI.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          security find-identity -v -p codesigning

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build App Bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          NOTARIZE: "1"
        run: |
          chmod +x scripts/build-app.sh
          ./scripts/build-app.sh ${{ steps.version.outputs.VERSION }}

      - name: Generate Sparkle Appcast
        env:
          SPARKLE_ED25519_PRIVATE_KEY: ${{ secrets.SPARKLE_ED25519_PRIVATE_KEY }}
        run: |
          if [[ -z "$SPARKLE_ED25519_PRIVATE_KEY" ]]; then
            echo "Missing SPARKLE_ED25519_PRIVATE_KEY secret."
            echo "Export it from Keychain via: .build/artifacts/sparkle/Sparkle/bin/generate_keys -x /path/to/key"
            exit 1
          fi

          DOWNLOAD_URL_PREFIX="https://github.com/multi-turn-inc/ai-usage-meter/releases/download/v${{ steps.version.outputs.VERSION }}/"
          echo "$SPARKLE_ED25519_PRIVATE_KEY" | .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
            .build/release

          test -f .build/release/appcast.xml
          echo "Generated appcast:"
          cat .build/release/appcast.xml

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            .build/release/AIUsageMeter-${{ steps.version.outputs.VERSION }}.dmg
            .build/release/appcast.xml
          body: |
            ## AI Usage Meter v${{ steps.version.outputs.VERSION }}

            ### Installation
            1. Download the DMG file
            2. Open the DMG and drag "AI Usage Meter" to Applications
            3. Launch the app (signed + notarized)

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Claude Code installed and logged in (for Claude monitoring)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
